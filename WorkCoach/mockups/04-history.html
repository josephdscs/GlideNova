<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390px, height=844px, initial-scale=1.0">
  <title>WorkCoach — History</title>
  <link rel="stylesheet" href="../../_shared/device-frame.css">
  <style>
    html, body {
      background: transparent;
      width: 390px;
      height: 844px;
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      width: 390px;
      height: 844px;
      background: #0D0D1A;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 54px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 8px;
    }
    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 8px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
    }

    /* Summary stats */
    .summary-row {
      display: flex;
      gap: 12px;
    }
    .summary-card {
      flex: 1;
      background: #1A1A2E;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 12px;
    }
    .summary-card.streak {
      background: rgba(91,79,232,0.14);
      border-color: rgba(91,79,232,0.3);
    }
    .summary-value {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .summary-card.streak .summary-value {
      color: #7B72F0;
    }
    .summary-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Weekly chart */
    .chart-section {
      background: #1A1A2E;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px;
    }
    .chart-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 14px;
    }
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 60px;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      background: rgba(91,79,232,0.25);
    }
    .bar.active {
      background: linear-gradient(to top, #5B4FE8, #7B72F0);
      box-shadow: 0 0 10px rgba(91,79,232,0.5);
    }
    .bar-day {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
    }

    /* Session list */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .session-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1A1A2E;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .session-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(91,79,232,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .session-info { flex: 1; }
    .session-task-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .session-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.38);
      margin-top: 2px;
    }
    .session-score {
      font-size: 14px;
      font-weight: 700;
      color: #7B72F0;
    }
  </style>
</head>
<body>
  <div class="device-root">
    <div class="device-shell">
      <div class="device-island"></div>
      <div class="device-screen">
        <div class="screen">
          <div class="status-bar">
            <span class="status-time">9:41</span>
          </div>

          <div class="content">
            <div class="page-title">Your Focus</div>

            <div class="summary-row">
              <div class="summary-card streak">
                <div class="summary-value">7</div>
                <div class="summary-label">Day Streak</div>
              </div>
              <div class="summary-card">
                <div class="summary-value">12.5h</div>
                <div class="summary-label">Total Focus</div>
              </div>
              <div class="summary-card">
                <div class="summary-value">23</div>
                <div class="summary-label">Sessions</div>
              </div>
            </div>

            <div class="chart-section">
              <div class="chart-label">This Week — Focus Hours</div>
              <div class="chart">
                <div class="bar-col"><div class="bar" style="height:28px;"></div><div class="bar-day">M</div></div>
                <div class="bar-col"><div class="bar active" style="height:44px;"></div><div class="bar-day">T</div></div>
                <div class="bar-col"><div class="bar" style="height:20px;"></div><div class="bar-day">W</div></div>
                <div class="bar-col"><div class="bar active" style="height:56px;"></div><div class="bar-day">T</div></div>
                <div class="bar-col"><div class="bar active" style="height:48px;"></div><div class="bar-day">F</div></div>
                <div class="bar-col"><div class="bar" style="height:32px;"></div><div class="bar-day">S</div></div>
                <div class="bar-col"><div class="bar" style="height:8px; opacity:0.4;"></div><div class="bar-day">S</div></div>
              </div>
            </div>

            <div class="section-label">Recent Sessions</div>

            <div class="session-list">
              <div class="session-row">
                <div class="session-icon">&#128196;</div>
                <div class="session-info">
                  <div class="session-task-name">Quarterly Report</div>
                  <div class="session-meta">25 min &bull; Encouraging &bull; Today</div>
                </div>
                <div class="session-score">94%</div>
              </div>
              <div class="session-row">
                <div class="session-icon">&#128187;</div>
                <div class="session-info">
                  <div class="session-task-name">Code Review</div>
                  <div class="session-meta">45 min &bull; Intense &bull; Yesterday</div>
                </div>
                <div class="session-score">88%</div>
              </div>
              <div class="session-row">
                <div class="session-icon">&#128243;</div>
                <div class="session-info">
                  <div class="session-task-name">Presentation Slides</div>
                  <div class="session-meta">25 min &bull; Calm &bull; 2 days ago</div>
                </div>
                <div class="session-score">91%</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="device-indicator"></div>
    </div>
  </div>
</body>
</html>
