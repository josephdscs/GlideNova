<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390px, height=844px, initial-scale=1.0">
  <title>WorkCoach — Session Complete</title>
  <link rel="stylesheet" href="../../_shared/device-frame.css">
  <style>
    html, body {
      background: transparent;
      width: 390px;
      height: 844px;
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      width: 390px;
      height: 844px;
      background: #0D0D1A;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Glow behind header */
    .glow {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 340px;
      height: 300px;
      background: radial-gradient(ellipse at 50% 30%, rgba(91,79,232,0.28) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Status bar */
    .status-bar {
      height: 54px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 24px 8px;
      position: relative;
      z-index: 1;
    }
    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 16px 24px 24px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Celebration */
    .celebration {
      text-align: center;
      padding: 20px 0 8px;
    }
    .celebration-icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 14px;
    }
    .celebration-title {
      font-size: 30px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .celebration-sub {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 12px;
    }
    .stat-card {
      flex: 1;
      background: #1A1A2E;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 16px 14px;
      text-align: center;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .stat-card.highlight .stat-value {
      color: #7B72F0;
    }

    /* AI debrief */
    .debrief {
      background: rgba(91,79,232,0.1);
      border: 1px solid rgba(91,79,232,0.22);
      border-left: 3px solid rgba(91,79,232,0.6);
      border-radius: 12px;
      padding: 16px;
    }
    .debrief-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(123,114,240,0.8);
      margin-bottom: 8px;
    }
    .debrief-text {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.78);
      line-height: 1.6;
    }

    /* CTA */
    .cta-btn {
      background: linear-gradient(135deg, #5B4FE8, #7B72F0);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      box-shadow: 0 8px 24px rgba(91,79,232,0.4);
    }
    .cta-secondary {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.38);
    }
  </style>
</head>
<body>
  <div class="device-root">
    <div class="device-shell">
      <div class="device-island"></div>
      <div class="device-screen">
        <div class="screen">
          <div class="glow"></div>
          <div class="status-bar">
            <span class="status-time">9:41</span>
          </div>

          <div class="content">
            <div class="celebration">
              <div class="celebration-icon">&#127881;</div>
              <div class="celebration-title">Session Complete</div>
              <div class="celebration-sub">Quarterly Report &bull; 25 minutes</div>
            </div>

            <div class="stats-row">
              <div class="stat-card">
                <div class="stat-value">25</div>
                <div class="stat-label">Minutes</div>
              </div>
              <div class="stat-card highlight">
                <div class="stat-value">94<span style="font-size:16px;font-weight:600;color:rgba(123,114,240,0.7)">%</span></div>
                <div class="stat-label">Focus Score</div>
              </div>
              <div class="stat-card">
                <div class="stat-value">3</div>
                <div class="stat-label">Day Streak</div>
              </div>
            </div>

            <div class="debrief">
              <div class="debrief-label">AI Coach Debrief</div>
              <div class="debrief-text">"You powered through the hard part. Your focus window is building — the second half of this session was your strongest yet."</div>
            </div>

            <div class="cta-btn">Start Another Session</div>
            <div class="cta-secondary">Done for now</div>
          </div>
        </div>
      </div>
      <div class="device-indicator"></div>
    </div>
  </div>
</body>
</html>
