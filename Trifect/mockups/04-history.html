<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390px, height=844px, initial-scale=1.0">
  <title>Trifect — History</title>
  <link rel="stylesheet" href="../../_shared/device-frame.css">
  <style>
    html, body { background: transparent; width: 390px; height: 844px; overflow: hidden; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; -webkit-font-smoothing: antialiased; }
    .screen { width: 390px; height: 844px; background: #0F0F14; display: flex; flex-direction: column; overflow: hidden; }
    .status-bar { height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 8px; }
    .status-time { font-size: 15px; font-weight: 600; color: #fff; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { fill: #fff; }
    .nav-title { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.03em; padding: 0 20px 12px; }
    .content { flex: 1; padding: 0 20px; overflow: hidden; display: flex; flex-direction: column; gap: 14px; }
    .stats-row { display: flex; gap: 10px; }
    .stat-card { flex: 1; background: #1C1C26; border-radius: 12px; padding: 12px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
    .stat-lbl { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .heatmap-card { background: #1C1C26; border-radius: 16px; padding: 14px 16px; }
    .heatmap-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); margin-bottom: 10px; }
    .heatmap-grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 3px; }
    .hm-cell { height: 14px; border-radius: 3px; }
    .hm-0 { background: rgba(255,255,255,0.07); }
    .hm-1 { background: rgba(91,94,244,0.35); }
    .hm-2 { background: #5B5EF4; }
    .section-label { font-size: 15px; font-weight: 700; color: #fff; }
    .day-row { display: flex; align-items: center; justify-content: space-between; background: #1C1C26; border-radius: 12px; padding: 12px 16px; }
    .day-info { display: flex; flex-direction: column; gap: 2px; }
    .day-date { font-size: 14px; font-weight: 700; color: #fff; }
    .day-sub { font-size: 12px; color: rgba(255,255,255,0.35); }
    .day-dots { display: flex; gap: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-done { background: #5B5EF4; }
    .dot-empty { background: rgba(255,255,255,0.12); }
    .tab-bar { height: 82px; background: #1C1C26; display: flex; align-items: flex-start; justify-content: space-around; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tab-icon { font-size: 22px; opacity: .35; }
    .tab-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); }
    .tab-label--active { color: #5B5EF4; }
    .tab-icon--active { opacity: 1; }
  </style>
</head>
<body>
  <div class="device-root">
    <div class="device-shell">
      <div class="device-island"></div>
      <div class="device-screen">
        <div class="screen">
          <div class="status-bar">
            <span class="status-time">9:41</span>
            <div class="status-icons">
              <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="16" height="7" rx="1.5" fill="white"/><path d="M23.5 4v4a2 2 0 0 0 0-4z" fill="rgba(255,255,255,0.4)"/></svg>
            </div>
          </div>
          <div class="nav-title">History</div>
          <div class="content">
            <div class="stats-row">
              <div class="stat-card"><div class="stat-val">28</div><div class="stat-lbl">Total Days</div></div>
              <div class="stat-card"><div class="stat-val">24</div><div class="stat-lbl">Completed</div></div>
              <div class="stat-card"><div class="stat-val">86%</div><div class="stat-lbl">Rate</div></div>
            </div>
            <div class="heatmap-card">
              <div class="heatmap-title">Activity (past month)</div>
              <div class="heatmap-grid">
                <div class="hm-cell hm-0"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-1"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-0"></div>
                <div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-1"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div>
                <div class="hm-cell hm-0"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-1"></div>
                <div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div><div class="hm-cell hm-2"></div>
              </div>
            </div>
            <div class="section-label">Last 7 Days</div>
            <div class="day-row">
              <div class="day-info"><div class="day-date">Tuesday, Mar 18</div><div class="day-sub">1/3 tasks completed</div></div>
              <div class="day-dots"><div class="dot dot-done"></div><div class="dot dot-empty"></div><div class="dot dot-empty"></div></div>
            </div>
            <div class="day-row">
              <div class="day-info"><div class="day-date">Monday, Mar 17</div><div class="day-sub">3/3 tasks completed</div></div>
              <span style="font-size:16px;">🔥</span>
            </div>
            <div class="day-row">
              <div class="day-info"><div class="day-date">Sunday, Mar 16</div><div class="day-sub">3/3 tasks completed</div></div>
              <span style="font-size:16px;">🔥</span>
            </div>
          </div>
          <div class="tab-bar">
            <div class="tab"><div class="tab-icon">✓</div><span class="tab-label">Today</span></div>
            <div class="tab"><div class="tab-icon tab-icon--active" style="color:#5B5EF4;">📅</div><span class="tab-label tab-label--active">History</span></div>
            <div class="tab"><div class="tab-icon">⚙</div><span class="tab-label">Settings</span></div>
          </div>
        </div>
      </div>
      <div class="device-indicator"></div>
    </div>
  </div>
</body>
</html>
